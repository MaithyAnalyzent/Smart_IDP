version: "3.9"

# docker-compose reads variables from your .env file automatically.
# Copy .env.example to .env and fill in values before running.

services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override with internal Docker network addresses
      - DATABASE_URL=postgresql://docuser:docpass@postgres:5432/doc_intel
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_USE_SSL=false
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    depends_on:
      - postgres
      - minio
    restart: unless-stopped
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
      POSTGRES_DB: doc_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"          # MinIO web console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
